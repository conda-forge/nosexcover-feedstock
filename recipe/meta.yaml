{% set name = "nosexcover" %}
{% set version = "1.0.11" %}
{% set compress_type = "tar.gz" %}
{% set hash = "298c3c655da587f6cab8a666e9f4b150320032431062dea91353988d45c8b883" %}
{% set build = 2 %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.{{ compress_type }}
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.{{ compress_type }}
  sha256: {{ hash }}

build:
  noarch: python
  preserve_egg_dir: True
  entry_points:
    - xcover = nosexcover.nosexcover:XCoverage

  number: {{ build }}
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools

  run:
    - python >={{ python_min }}
    - nose
    - coverage >=3.4

test:
  requires:
    - python {{ python_min }}
  imports:
    - nosexcover
    - nosexcover.nosexcover

about:
  home: https://github.com/cmheisel/nose-xcover/
  license_file: {{ RECIPE_DIR }}/LICENSE.txt
  license: MIT
  license_family: MIT
  summary: 'Extends nose.plugins.cover to add Cobertura-style XML reports'
  dev_url: https://github.com/cmheisel/nose-xcover/

extra:
  recipe-maintainers:
    - pmlandwehr
